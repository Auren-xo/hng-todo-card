<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo Card</title>
  <link rel="stylesheet" href="todo.css"/>
</head>

<body>

  <main class="wrapper">

    <article class="todo-card" data-testid="test-todo-card">

      <h2 id="todo-title" data-testid="test-todo-title">
        Build HNG Task Card
      </h2>

      <p data-testid="test-todo-description">
        Finish the Stage 0 frontend task card using HTML, CSS and JavaScript.
      </p>

      <div class="row">
        <span>Priority</span>
        <strong data-testid="test-todo-priority">High</strong>
      </div>

      <div class="row">
        <span>Due</span>
        <time data-testid="test-todo-due-date" datetime="2026-04-16">
          April 16, 2026
        </time>
      </div>

      <div class="row">
        <span>Time left</span>
        <span data-testid="test-todo-time-remaining">
          Due in 6 days
        </span>
 </div>

      <div class="row">
        <span>Status</span>
        <span id="status" data-testid="test-todo-status">
          Pending
        </span>
      </div>

      <label>
     <input type="checkbox" id="toggle" data-testid="test-todo-complete-toggle"/>
        Completed
      </label>


      <ul data-testid="test-todo-tags">
        <li data-testid="test-todo-tag-work">Work</li>
        <li data-testid="test-todo-tag-urgent">Urgent</li>
      </ul>

      <div class="buttons">
        <button id="editBtn" data-testid="test-todo-edit-button">Edit</button>
        <button id="deleteBtn" data-testid="test-todo-delete-button">Delete</button>
      </div>

    </article>

  </main>

  <script src="todo.js"></script>
</body>
</html>
