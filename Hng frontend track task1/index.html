<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo Card</title>
  <link rel="stylesheet" href="todo.css" />
</head>

<body>

  <main class="wrapper">

    <article class="todo-card" data-testid="test-todo-card">

      <h2 id="todo-title" data-testid="test-todo-title">
        Build HNG Task Card
      </h2>

      <p id="todo-desc" data-testid="test-todo-description" class="desc">
        Finish the Stage 1 frontend task card using HTML, CSS and JavaScript.
      </p>

      <button id="toggleDesc" data-testid="test-todo-expand-toggle">
        Expand
      </button>

      <div class="row">
        <span>Priority</span>

        <span class="priority-wrapper">
          <span id="priorityIndicator" data-testid="test-todo-priority-indicator" class="dot high">
          </span>

          <strong id="todo-priority" data-testid="test-todo-priority">
            High
          </strong>
        </span>
      </div>

      <div class="row">
        <span>Due</span>
        <time id="todo-date" data-testid="test-todo-due-date" datetime="2026-04-25T23:59:59">
  2026-04-25
</time>
      </div>

      <div class="row">
        <span>Time left</span>
        <span data-testid="test-todo-time-remaining">

        </span>
      </div>

      <div class="row">
        <span>Status</span>

        <select id="statusControl" data-testid="test-todo-status-control">
          <option value="Pending">Pending</option>
          <option value="In Progress">In Progress</option>
          <option value="Done">Done</option>
        </select>
      </div>
      <div class="row">
        <span>Current status</span>
        <span id="status" data-testid="test-todo-status">
          Pending
        </span>
      </div>

      <label>
        <input type="checkbox" id="toggle" data-testid="test-todo-complete-toggle" />
        Completed
      </label>


      <ul data-testid="test-todo-tags">
        <li data-testid="test-todo-tag-work">Work</li>
        <li data-testid="test-todo-tag-urgent">Urgent</li>
      </ul>

      <div class="buttons">
        <button id="editBtn" data-testid="test-todo-edit-button">Edit</button>
        <button id="deleteBtn" data-testid="test-todo-delete-button">Delete</button>
      </div>


      <div id="editForm" data-testid="test-todo-edit-form" class="edit-form" style="display: none;">

        <h3>Edit Task</h3>

        <label>
          Title
          <input type="text" id="editTitle" data-testid="test-todo-edit-title-input" />
        </label>

        <label>
          Description
          <textarea id="editDescription" data-testid="test-todo-edit-description-input"></textarea>
        </label>

        <label>
          Priority
          <select id="editPriority" data-testid="test-todo-edit-priority-select">
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
          </select>
        </label>

        <label>
          Due Date
          <input type="date" id="editDate" data-testid="test-todo-edit-due-date-input" />
        </label>

        <div class="form-buttons">
          <button id="saveBtn" data-testid="test-todo-save-button">Save</button>
          <button id="cancelBtn" data-testid="test-todo-cancel-button">Cancel</button>
        </div>

      </div>

    </article>

  </main>

  <script src="todo.js"></script>
</body>

</html>
